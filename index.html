<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Displays site properly based on user's device -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-kreis-32x32.png"
    />

    <title>Frontend Mentor | Huddle landing page</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="./assets/images/logo.svg" alt="Huddle Logo" class="logo" />
      </header>

      <main>
        <div class="hero-image">
          <img
            src="./assets/images/illustration-mockups.svg"
            alt=""
            aria-hidden="true"
          />
        </div>

        <div class="hero-text">
          <h1>Build The Community Your Fans Will Love</h1>
          <p>
            Huddle re-imagines the way we build communities. You have a voice,
            but so does your audience. Create connections with your users as you
            engage in genuine discussion.
          </p>
          <a href="#" class="btn">Register</a>
        </div>
      </main>

      <nav class="social-links" aria-label="Social Media Links">
        <a href="#" class="social-icon" aria-label="Visit our Facebook page"
          ><i class="fab fa-facebook-f" aria-hidden="true"></i
        ></a>

        <a href="#" class="social-icon" aria-label="Visit our Twitter page"
          ><i class="fab fa-twitter" aria-hidden="true"></i
        ></a>

        <a href="#" class="social-icon" aria-label="Visit our Instagram page"
          ><i class="fab fa-instagram" aria-hidden="true"></i
        ></a>
      </nav>
    </div>

    <!-- Attribution -->
    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/huddle-landing-page-with-a-single-introductory-section-B_2Wvxgi0"
        target="_blank"
        rel="noopener noreferrer"
      >
        Frontend Mentor </a
      >. Coded by
      <a
        href="https://github.com/devkatiareis/FrontendMentor-huddle-landing-page-code-challenge"
        target="_blank"
        rel="noopener noreferrer"
      >
        Katia Reis </a
      >.
    </footer>
  </body>
</html>
